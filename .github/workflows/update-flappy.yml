name: Update Flappy Graph Game

on:
  schedule:
    - cron: '15 0 * * *'  # Daily, offset from space shooter to avoid push races
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-flappy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2  # Crucial for commit-amend detection

      - uses: janmaaarc/gh-flappy-graph@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          output-path: 'flappy.gif'
          bird: 'ghost'
